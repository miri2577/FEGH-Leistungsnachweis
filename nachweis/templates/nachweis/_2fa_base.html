<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Zwei-Faktor · FEGH-Leistungsnachweis{% endblock %}</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
      background:linear-gradient(135deg,#00539f,#003d78);min-height:100vh;
      display:grid;place-items:center;color:#1e2a37}
    .card{background:#fff;width:420px;max-width:94vw;border-radius:16px;
      box-shadow:0 18px 50px rgba(0,25,54,.35);overflow:hidden}
    .head{padding:26px 30px 6px;text-align:center}
    .logo{width:52px;height:52px;border-radius:13px;background:#00539f;color:#fff;
      display:grid;place-items:center;font-weight:800;font-size:26px;margin:0 auto 12px}
    .head h1{font-size:18px;margin:4px 0 2px}.head p{color:#697786;font-size:13px;margin:0}
    form,.body{padding:14px 30px 26px}
    label{display:block;font-size:12.5px;color:#697786;font-weight:600;margin:14px 0 6px}
    input[type=text]{width:100%;padding:11px 12px;border:1px solid #d9e2ea;border-radius:9px;font-size:16px;
      letter-spacing:.18em;text-align:center;font-variant-numeric:tabular-nums}
    input:focus{outline:2px solid #e9f1f9;border-color:#1f7bc0}
    button.primary{width:100%;margin-top:18px;background:#00539f;color:#fff;border:0;padding:12px;
      border-radius:9px;font-weight:600;font-size:14px;cursor:pointer}
    button.primary:hover{background:#003d78}
    .err{background:#fbeae8;color:#c0392b;border-radius:9px;padding:9px 12px;font-size:13px;margin-top:14px}
    .qr{display:grid;place-items:center;padding:14px;background:#f6f9fc;border:1px solid #e2ecf5;border-radius:12px;margin-top:8px}
    .qr svg{width:200px;height:200px}
    .secret{font-family:Consolas,monospace;font-size:13px;background:#eef2f6;padding:8px 10px;border-radius:8px;
      text-align:center;letter-spacing:.08em;word-break:break-all;margin-top:10px}
    .muted{color:#697786;font-size:12.5px}
    ol{margin:8px 0 0;padding-left:20px;font-size:13.5px;color:#33414f}ol li{margin:5px 0}
    a.link{display:inline-block;margin-top:14px;color:#00539f;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="logo">F</div>
      <h1>{% block heading %}Zwei-Faktor-Authentifizierung{% endblock %}</h1>
      <p>{% block sub %}FEGH-Leistungsnachweis{% endblock %}</p>
    </div>
    {% block card %}{% endblock %}
  </div>
</body>
</html>
