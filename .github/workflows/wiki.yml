name: Wiki (MkDocs) veröffentlichen

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "mkdocs-material>=9.5"
      # Baut die Doku und pusht sie in den Branch gh-pages (GitHub Pages: Quelle = gh-pages)
      - run: mkdocs gh-deploy --force
