services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - applog:/app/logs         # benanntes Volume (vom non-root-User beschreibbar)
    healthcheck:
      # reiner TCP-Check auf gunicorn:8000 (umgeht SSL-Redirect/Host-Prüfung)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',8000),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - staticfiles:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy   # erst proxyen, wenn gunicorn wirklich bereit ist

volumes:
  pgdata: {}
  staticfiles: {}
  media: {}
  applog: {}
  caddy_data: {}
  caddy_config: {}
